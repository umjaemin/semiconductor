function PieChartSVG({ title, labels, data, colors }) {
  const total = data.reduce((a,b)=>a+b,0);
  let angle = -90;
  const R = 60, CX = 75, CY = 75;
  const slices = data.map((v,i) => {
    const frac = v/total, start = angle, sweep = frac*360;
    angle += sweep;
    const large = sweep > 180 ? 1 : 0;
    const x1 = CX + R*Math.cos(start*Math.PI/180), y1 = CY + R*Math.sin(start*Math.PI/180);
    const x2 = CX + R*Math.cos((start+sweep)*Math.PI/180), y2 = CY + R*Math.sin((start+sweep)*Math.PI/180);
    return { d:`M${CX},${CY} L${x1},${y1} A${R},${R} 0 ${large} 1 ${x2},${y2} Z`, color:colors[i], pct:Math.round(frac*100) };
  });
  return (
    <div style={{ marginBottom:20 }}>
      <div style={{ fontSize:12, color:"var(--text-3)", marginBottom:10 }}>{title}</div>
      <div style={{ display:"flex", gap:20, alignItems:"center", flexWrap:"wrap" }}>
        <svg width="150" height="150" viewBox="0 0 150 150">
          {slices.map((s,i)=><path key={i} d={s.d} fill={s.color} opacity="0.9" stroke="#060b18" strokeWidth="1.5"><title>{labels[i]}: {s.pct}%</title></path>)}
        </svg>
        <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
          {labels.map((l,i)=>(
            <div key={i} style={{ display:"flex", alignItems:"center", gap:8, fontSize:12 }}>
              <span style={{ width:11, height:11, borderRadius:3, background:colors[i], flexShrink:0 }}/>
              <span style={{ color:"var(--text-3)" }}>{l}</span>
              <span style={{ color:"var(--text-1)", fontWeight:700, marginLeft:"auto" }}>{slices[i].pct}%</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function BarChartSVG({ title, labels, data, colors, reasons }) {
  const max = Math.max(...data);
  const W=620,H=170,PL=40,PT=20,PB=36,barW=Math.min(48,(W-PL-20)/labels.length-8);
  const gap=(W-PL-20-barW*labels.length)/(labels.length+1);
  return (
    <div style={{ marginBottom:20 }}>
      <div style={{ fontSize:12, color:"var(--text-3)", marginBottom:4 }}>{title}</div>
      {reasons && <div style={{ fontSize:10, color:"var(--text-3)", marginBottom:6 }}>막대에 마우스를 올리면 증감 이유가 표시됩니다</div>}
      <svg width="100%" viewBox={`0 0 ${W} ${H+PT+PB}`} style={{ overflow:"visible" }}>
        {[0,0.5,1].map((r,i)=><line key={i} x1={PL} y1={PT+H*(1-r)} x2={W-10} y2={PT+H*(1-r)} stroke="var(--border)" strokeWidth="1"/>)}
        {labels.map((label,i)=>{
          const bh=(data[i]/max)*H, x=PL+gap*(i+1)+barW*i;
          return (<g key={i} style={{ cursor: reasons ? "pointer" : "default" }}>
            <rect x={x} y={PT+H-bh} width={barW} height={bh} fill={colors[i]} rx="3" opacity="0.9">
              {reasons && <title>{label}: {data[i]} — {reasons[i]}</title>}
            </rect>
            <text x={x+barW/2} y={PT+H+14} textAnchor="middle" fontSize="10" fill="var(--text-3)">{label}</text>
            <text x={x+barW/2} y={PT+H-bh-4} textAnchor="middle" fontSize="10" fill="var(--text-3)">{data[i]}</text>
          </g>);
        })}
      </svg>
    </div>
  );
}

function LineChartSVG({ title, labels, data, color, reasons }) {
  const min=Math.min(...data), max=Math.max(...data);
  const W=620,H=140,PL=44,PT=16,PB=32;
  const px=(i)=>PL+i*(W-PL-10)/(labels.length-1);
  const py=(v)=>PT+H-(v-min)/(max-min||1)*H;
  const pts=data.map((v,i)=>`${px(i)},${py(v)}`).join(" ");
  return (
    <div style={{ marginBottom:20 }}>
      <div style={{ fontSize:12, color:"var(--text-3)", marginBottom:4 }}>{title}</div>
      {reasons && <div style={{ fontSize:10, color:"var(--text-3)", marginBottom:6 }}>점에 마우스를 올리면 증감 이유가 표시됩니다</div>}
      <svg width="100%" viewBox={`0 0 ${W} ${H+PT+PB}`} style={{ overflow:"visible" }}>
        {[0,0.5,1].map((r,i)=>(<g key={i}>
          <line x1={PL} y1={PT+H*(1-r)} x2={W-10} y2={PT+H*(1-r)} stroke="var(--border)" strokeWidth="1"/>
          <text x={PL-4} y={PT+H*(1-r)+4} textAnchor="end" fontSize="10" fill="var(--text-3)">{Math.round(min+(max-min)*r)}</text>
        </g>))}
        <polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round" opacity="0.9"/>
        {data.map((v,i)=>(
          <circle key={i} cx={px(i)} cy={py(v)} r="5" fill={color} stroke="var(--input-bg)" strokeWidth="2" style={{ cursor: reasons ? "pointer":"default" }}>
            {reasons && <title>{labels[i]}: {v} — {reasons[i]}</title>}
          </circle>
        ))}
        {labels.map((l,i)=><text key={i} x={px(i)} y={PT+H+18} textAnchor="middle" fontSize="10" fill="var(--text-3)">{l}</text>)}
      </svg>
    </div>
  );
}

function highlightGlossary(str, onTermClick) {
  let parts = [str];
  GLOSSARY_KEYS.forEach(term => {
    const next = [];
    parts.forEach(part => {
      if (typeof part !== "string") { next.push(part); return; }
      const idx = part.indexOf(term);
      if (idx === -1) { next.push(part); return; }
      next.push(part.slice(0,idx));
      next.push(
        <span key={term+idx+Math.random()} onClick={()=>onTermClick(term)}
          style={{ color:"#b45309", borderBottom:"1px dotted #b45309", cursor:"pointer", fontWeight:600 }}>{term}</span>
      );
      next.push(part.slice(idx+term.length));
    });
    parts = next;
  });
  return parts;
}

function MarkdownText({ text, onTermClick }) {
  return (
    <div style={{ lineHeight:1.85, fontSize:14 }}>
      {text.split("\n").map((line,i) => {
        if (line.startsWith("## ")) return <h3 key={i} style={{ color:"var(--accent)", fontSize:14, marginTop:18, marginBottom:8, fontWeight:700, borderLeft:"3px solid #1e3a5f", paddingLeft:10 }}>{line.slice(3)}</h3>;
        if (line.startsWith("# "))  return <h2 key={i} style={{ color:"var(--text-1)", fontSize:17, marginTop:22, marginBottom:8, fontWeight:800 }}>{line.slice(2)}</h2>;
        if (line.startsWith("- ")||line.startsWith("• ")) {
          const parts = line.slice(2).split(/\*\*(.*?)\*\*/g);
          return (
            <div key={i} style={{ display:"flex", gap:10, margin:"5px 0", paddingLeft:8 }}>
              <span style={{ color:"var(--accent)", flexShrink:0, marginTop:3 }}>▸</span>
              <span style={{ color:"var(--text-3)" }}>{parts.map((p,j)=>j%2===1
                ? <strong key={j} style={{ color:"var(--text-1)" }}>{onTermClick?highlightGlossary(p,onTermClick):p}</strong>
                : (onTermClick?highlightGlossary(p,onTermClick):p))}</span>
            </div>
          );
        }
        if (line.trim()==="") return <div key={i} style={{ height:7 }}/>;
        const parts = line.split(/\*\*(.*?)\*\*/g);
        return <p key={i} style={{ color:"var(--text-3)", margin:"3px 0" }}>{parts.map((p,j)=>j%2===1
          ? <strong key={j} style={{ color:"var(--text-1)" }}>{onTermClick?highlightGlossary(p,onTermClick):p}</strong>
          : (onTermClick?highlightGlossary(p,onTermClick):p))}</p>;
      })}
    </div>
  );
}

function highlightCompanies(text) {
  let parts = [text];
  KNOWN_COMPANIES.forEach(name => {
    const next = [];
    parts.forEach(part => {
      if (typeof part !== "string") { next.push(part); return; }
      const idx = part.indexOf(name);
      if (idx === -1) { next.push(part); return; }
      next.push(part.slice(0,idx));
      next.push(<strong key={name+idx+Math.random()} style={{ color:"var(--accent)" }}>{name}</strong>);
      next.push(part.slice(idx+name.length));
    });
    parts = next;
  });
  return parts;
}

function routeSearch(query) {
  const q = query.toLowerCase();
  for (const { keywords, tab } of SEARCH_ROUTE_MAP) {
    if (keywords.some(k => q.includes(k.toLowerCase()))) return tab;
  }
  return null;
}

              <button key={t.id} onClick={()=>navigate(t.id)} style={{ width:"100%", textAlign:"left", padding:"9px 12px", background:activeTab===t.id?"var(--accent-tint)":"transparent", border:activeTab===t.id?"1px solid var(--accent-tint)":"1px solid transparent", borderRadius:3, color:activeTab===t.id?"var(--accent)":"var(--text-3)", cursor:"pointer", fontSize:13, fontWeight:activeTab===t.id?600:400, display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:2 }}>
                <span>★ {t.label}</span>
              </button>
            ))}
          </div>
        )}
        {GROUPS.map(group=>(
          <div key={group} style={{ padding:"12px 10px 4px" }}>
            <div style={{ fontSize:9, fontWeight:700, color:"var(--text-3)", letterSpacing:"0.1em", textTransform:"uppercase", paddingLeft:8, marginBottom:5 }}>{group}</div>
            {TABS.filter(t=>t.group===group).map(t=>(
              <div key={t.id} style={{ display:"flex", alignItems:"center", marginBottom:2 }}>
                <button onClick={()=>navigate(t.id)} style={{ flex:1, textAlign:"left", padding:"9px 12px", background:activeTab===t.id?"var(--accent-tint)":"transparent", border:activeTab===t.id?"1px solid var(--accent-tint)":"1px solid transparent", borderRadius:3, color:activeTab===t.id?"var(--accent)":"var(--text-3)", cursor:"pointer", fontSize:13, fontWeight:activeTab===t.id?600:400, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                  <span>{t.label}</span>
                  <span>{loading[t.id]&&<span style={{ fontSize:8, color:"#f59e0b" }}>●</span>}{liveContent[t.id]&&!loading[t.id]&&<span style={{ fontSize:8, color:"var(--accent)" }}></span>}</span>
                </button>
                <button onClick={()=>toggleFavorite(t.id)} title="즐겨찾기" style={{ background:"transparent", border:"none", cursor:"pointer", color: favorites.includes(t.id) ? "#f59e0b" : "var(--border-strong)", fontSize:13, padding:"0 6px" }}>★</button>
              </div>
            ))}
          </div>
        ))}
        <div style={{ marginTop:"auto", padding:"14px", borderTop:"1px solid var(--card-bg-2)" }}>
          <div style={{ fontSize:9, color:"var(--text-3)", marginBottom:6, fontWeight:600 }}>{L.exchangeRate}</div>
          <div style={{ fontSize:11, color:"var(--text-2)", lineHeight:1.9 }}>
            {fxError && <div style={{ color:"var(--text-4)" }}>환율 정보를 불러올 수 없습니다</div>}
            {!fxError && !fxRates && <div style={{ color:"var(--text-4)" }}>불러오는 중...</div>}
            {fxRates && fxRates.rates && (
              <div>
                <div>USD/KRW &nbsp; {fxRates.rates.KRW ? fxRates.rates.KRW.toFixed(1) : "-"}</div>
                <div>JPY100/KRW &nbsp; {fxRates.rates.JPY ? (fxRates.rates.KRW/fxRates.rates.JPY*100).toFixed(1) : "-"}</div>
                <div>CNY/KRW &nbsp; {fxRates.rates.CNY ? (fxRates.rates.KRW/fxRates.rates.CNY).toFixed(1) : "-"}</div>
              </div>
            )}
          </div>
          <div style={{ fontSize:9, color:"var(--text-3)", marginTop:12, marginBottom:6, fontWeight:600 }}>{L.analysisTarget}</div>
          <div style={{ display:"flex", flexWrap:"wrap", gap:4 }}>
            {["KR","US","CN","JP","TW"].map(c=>(<span key={c} style={{ fontSize:10, background:"var(--card-bg-2)", border:"1px solid var(--border)", borderRadius:4, padding:"2px 6px", color:"var(--text-3)" }}>{c}</span>))}
          </div>
        </div>
      </aside>

      <main style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden", paddingTop: isMobile ? 54 : 0 }}>
        <div style={{ padding:"14px 32px", borderBottom:"1px solid var(--card-bg-2)", background:"var(--topbar-bg)", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <div>
            <h2 style={{ margin:0, fontSize:20, fontWeight:800 }}>{tab.label}</h2>
            <p style={{ margin:"3px 0 0", fontSize:12, color:"var(--text-4)" }}>
              {activeTab==="process"?"단계별 공정 상세 · 사진(실패 시 일러스트) + 캡션":
               activeTab==="search"?"키워드 검색 · 실시간 관련 뉴스 · 시작 화면":
               activeTab==="glossary"?"전문용어 클릭 시 여기로 이동":
               activeTab==="compare"?"주요 기업·국가 핵심 지표 비교":
               isLiveShown?` 실시간 업데이트 텍스트 표시 중 · ${timeAgo(lastUpdated[activeTab])}`:" 사전 정리 데이터 · KPI·차트·국가전망 포함"}
            </p>
          </div>
          {activeTab!=="process"&&activeTab!=="search"&&activeTab!=="glossary"&&activeTab!=="compare"&&(
            <div style={{ display:"flex", gap:8, alignItems:"center" }}>
              {hasLive && isLiveShown && (
                <button onClick={()=>revertLive(activeTab)} style={{ padding:"7px 14px", background:"var(--card-bg-2)", border:"1px solid var(--border-strong)", borderRadius:3, color:"var(--text-3)", fontSize:12, cursor:"pointer" }}>기본 데이터로 복원</button>
              )}
              {hasLive && !isLiveShown && (
                <button onClick={()=>setShowLive(p=>({...p,[activeTab]:true}))} style={{ padding:"7px 14px", background:"var(--accent-tint)", border:"1px solid var(--accent-tint)", borderRadius:3, color:"var(--accent)", fontSize:12, cursor:"pointer" }}>실시간 결과 다시 보기</button>
              )}
              <button onClick={()=>fetchLive(activeTab)} disabled={loading[activeTab]} style={{ padding:"7px 16px", background:"linear-gradient(135deg,var(--accent-tint),rgba(0,85,255,0.15))", border:"1px solid var(--accent-tint)", borderRadius:3, color:"var(--accent)", fontSize:12, cursor:loading[activeTab]?"not-allowed":"pointer", fontWeight:600, opacity:loading[activeTab]?0.6:1 }}>
                {loading[activeTab]?"⏳ 업데이트 중...":" 실시간 새로고침"}
              </button>
            </div>
          )}
        </div>

        <div style={{ padding:"6px 32px", background:"var(--accent-tint)", borderBottom:"1px solid var(--border)", fontSize:11, color:"var(--text-2)", textAlign:"center" }}>
          {L.lastUpdated}: 2024~2025 (사전 정리 데이터) · 실시간 뉴스 검색은 통합 검색 탭에서 최신 정보 확인 가능
        </div>
        <div style={{ flex:1, overflowY:"auto", padding:"24px 32px" }}>
          {activeTab==="process"&&<ProcessTab/>}
          {activeTab==="compare"&&<CompareTab/>}
          {activeTab==="glossary"&&<GlossaryTab highlightTerm={glossaryTerm}/>}

          {activeTab==="search"&&(
            <div style={{ maxWidth:960 }}>
              <Disclaimer/>
              <div style={{ background:"var(--card-bg)", border:"1px solid var(--accent-tint)", borderRadius:4, padding:"26px 30px", marginBottom:16 }}>
                <div style={{ fontSize:14, color:"var(--text-3)", marginBottom:12, fontWeight:600 }}>국가·기술·기업·소재·정책·HS코드를 검색하면 실시간 관련 뉴스를 보여드립니다</div>
                <div style={{ fontSize:12, color:"var(--text-3)", marginBottom:12 }}>예: "삼성전자", "HBM4", "TSMC 2나노"</div>
                <div style={{ display:"flex", gap:10 }}>
                  <input value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doSearch(searchQuery)}
                    placeholder="검색어를 입력하세요... (예: 삼성전자, HBM4, 반도체 수출)"
                    style={{ flex:1, padding:"13px 16px", background:"var(--input-bg)", border:"1px solid var(--accent-tint)", borderRadius:3, color:"var(--text-1)", fontSize:15, outline:"none" }}/>
                  <button onClick={()=>doSearch(searchQuery)} disabled={searchLoading} style={{ padding:"13px 26px", background:"var(--accent)", border:"none", borderRadius:3, color:"#fff", fontWeight:700, fontSize:14, cursor:"pointer", opacity:searchLoading?0.6:1 }}>
                    {searchLoading?"분석 중...":"검색"}
                  </button>
                </div>
                <div style={{ display:"flex", gap:6, marginTop:14, flexWrap:"wrap" }}>
                  {["한국","일본","중국","대만","미국","HBM","SiC","GaN","CHIPS법","EUV","공급망","불화수소","GAA","8542","수출통제","파운드리"].map(c=>(
                    <button key={c} onClick={()=>{setSearchQuery(c);doSearch(c);}} style={{ padding:"5px 12px", background:"var(--border)", border:"1px solid var(--border-strong)", borderRadius:3, color:"var(--text-3)", fontSize:11, cursor:"pointer" }}>{c}</button>
                  ))}
                </div>
              </div>

              {routeSuggestion&&searchResult&&(
                <div style={{ background:"rgba(99,102,241,0.1)", border:"1px solid rgba(99,102,241,0.25)", borderRadius:3, padding:"12px 18px", marginBottom:16, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                  <span style={{ fontSize:13, color:"#3730a3" }}><strong>"{searchQuery}"</strong>은 <strong>{TABS.find(t=>t.id===routeSuggestion)?.label}</strong> 탭에서 차트·국가별 전망과 함께 더 자세히 볼 수 있어요</span>
                  <button onClick={()=>navigate(routeSuggestion)} style={{ padding:"6px 14px", background:"rgba(99,102,241,0.2)", border:"1px solid rgba(99,102,241,0.4)", borderRadius:3, color:"#4f46e5", fontSize:12, cursor:"pointer", fontWeight:600, whiteSpace:"nowrap" }}>관련 탭으로 이동</button>
                </div>
              )}

              {searchHistory.length>0&&(
                <div style={{ display:"flex", gap:8, marginBottom:14, flexWrap:"wrap", alignItems:"center" }}>
                  <span style={{ fontSize:11, color:"var(--text-3)" }}>최근:</span>
                  {searchHistory.map((h,i)=>(<button key={i} onClick={()=>{setSearchQuery(h.query);doSearch(h.query);}} style={{ padding:"3px 10px", background:"rgba(99,102,241,0.1)", border:"1px solid rgba(99,102,241,0.2)", borderRadius:3, color:"#4338ca", fontSize:11, cursor:"pointer" }}>{h.query}</button>))}
                </div>
              )}

              <div style={{ background:"var(--card-bg)", border:"1px solid var(--border)", borderRadius:4, padding:"30px 34px", minHeight:300 }}>
                {searchLoading&&(<div style={{ display:"flex", flexDirection:"column", alignItems:"center", padding:"60px 0" }}><LoadingDots/><p style={{ color:"var(--text-4)", fontSize:13, marginTop:14 }}>"{searchQuery}" 관련 뉴스 검색 중...</p></div>)}
                {!searchLoading&&!searchResult&&!searchError&&(<div style={{ textAlign:"center", padding:"80px 0", color:"var(--text-3)" }}><div style={{ fontSize:56, marginBottom:16 }}></div><p style={{ fontSize:15 }}>키워드를 검색하면 실시간 관련 뉴스를<br/>제목·출처·링크와 함께 보여드립니다</p></div>)}
                {searchError&&(<div style={{ padding:16, background:"rgba(239,68,68,0.08)", border:"1px solid rgba(239,68,68,0.2)", borderRadius:3, color:"#b91c1c", fontSize:13, lineHeight:1.6 }}> {searchError}</div>)}
                {searchResult&&!searchLoading&&searchResult.length===0&&(<div style={{ textAlign:"center", padding:"60px 0", color:"var(--text-3)" }}>관련 뉴스를 찾지 못했습니다.</div>)}
                {searchResult&&!searchLoading&&searchResult.length>0&&(
                  <div>
                    <div style={{ fontSize:12, color:"var(--text-3)", marginBottom:14 }}>"{searchQuery}" 검색 결과 — 관련 실시간 뉴스 {searchResult.length}건</div>
                    {searchResult.map((item,i)=>(
                      <a key={i} href={item.link} target="_blank" rel="noopener noreferrer" style={{ display:"block", textDecoration:"none", background:"var(--card-solid)", border:"1px solid var(--border)", borderRadius:3, padding:"14px 18px", marginBottom:10 }}>
                        <div style={{ fontSize:14, fontWeight:700, color:"var(--text-1)", marginBottom:4 }}>{highlightCompanies(item.title)}</div>
                        <div style={{ fontSize:12, color:"var(--text-4)", lineHeight:1.6, marginBottom:6 }}>{highlightCompanies(item.description)}</div>
                        <div style={{ display:"flex", gap:8, alignItems:"center", fontSize:11, color:"var(--text-3)" }}>
                          <span> {(()=>{try{return new URL(item.link).hostname;}catch{return item.link;}})()}</span>
                          <span>·</span>
                          <span>{item.pubDate}</span>
                        </div>
                      </a>
                    ))}
                  </div>
                )}
              </div>
            </div>
          )}

          {activeTab!=="search"&&activeTab!=="process"&&activeTab!=="glossary"&&activeTab!=="compare"&&(
            <div style={{ background:"var(--card-bg)", border:"1px solid var(--border)", borderRadius:4, padding:"28px 32px", minHeight:400, maxWidth:1040 }}>
              {loading[activeTab]&&(<div style={{ display:"flex", flexDirection:"column", alignItems:"center", padding:"60px 0" }}><LoadingDots/><p style={{ color:"var(--text-4)", fontSize:13, marginTop:14 }}>AI가 웹을 검색하고 최신 정보를 가져오는 중...</p></div>)}
              {error[activeTab]&&(
                <div style={{ padding:14, background:"rgba(239,68,68,0.08)", border:"1px solid rgba(239,68,68,0.2)", borderRadius:3, color:"#b91c1c", display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
                  <span> {error[activeTab]}</span>
                  <button onClick={()=>fetchLive(activeTab)} style={{ padding:"6px 12px", background:"rgba(239,68,68,0.15)", border:"1px solid rgba(239,68,68,0.3)", borderRadius:3, color:"#b91c1c", fontSize:12, cursor:"pointer" }}>재시도</button>
                </div>
              )}
              {!loading[activeTab]&&(
                <div>
                  <TabContent tabId={activeTab} onNavigate={navigate}/>
                  {isLiveShown && (
                    <div style={{ marginTop:24, borderTop:"2px solid var(--accent-tint)", paddingTop:20 }}>
                      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:14 }}>
                        <span style={{ fontSize:12, fontWeight:700, color:"var(--accent)" }}>실시간 업데이트 결과</span>
                        <span style={{ fontSize:10, color:"var(--text-3)" }}>{timeAgo(lastUpdated[activeTab])}</span>
                        <button onClick={()=>clearLive(activeTab)} style={{ marginLeft:"auto", fontSize:10, color:"var(--text-3)", background:"transparent", border:"1px solid var(--border)", borderRadius:3, padding:"3px 8px", cursor:"pointer" }}>삭제</button>
                      </div>
                      <MarkdownText text={liveContent[activeTab]} onTermClick={(t)=>navigate("glossary",t)}/>
                    </div>
                  )}
                </div>
              )}
            </div>
          )}

          <p style={{ textAlign:"center", color:"var(--text-3)", fontSize:11, marginTop:20 }}>
             향후 기업별 미래 예측 기능 추가 예정 ·  버튼으로 실시간 업데이트 · 기본 데이터: 2024~2025
          </p>
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<SemiconductorDashboard />);
</script>
</body>
</html>
